{{/* 디스플레이 폰트 — Gmarket Sans (로고·히어로용) */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansTTFBold.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansTTFMedium.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansTTFLight.css">

{{/* Google AdSense (소유권 확인 + 광고 게재) */}}
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5237519328448179"
     crossorigin="anonymous"></script>

{{/* Product / Review / FAQ JSON-LD */}}
{{ if .Params.product }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ .Params.product.name }}",
  "description": "{{ .Params.description }}",
  {{ with .Params.product.url }}"url": "{{ . }}",{{ end }}
  {{ with .Params.product.rating }}
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ . }}",
    "reviewCount": "{{ default 0 $.Params.product.review_count }}"
  },{{ end }}
  {{ with .Params.product.price }}
  "offers": {
    "@type": "Offer",
    "price": "{{ . }}",
    "priceCurrency": "{{ default "KRW" $.Params.product.currency }}",
    "availability": "https://schema.org/InStock"
  }{{ end }}
}
</script>
{{ end }}

{{ if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $item := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ .q }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ .a }}"
      }
    }{{ end }}
  ]
}
</script>
{{ end }}

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "홈",
      "item": "{{ .Site.BaseURL }}"
    }
    {{ with (index .Params.categories 0) }},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ . }}",
      "item": "{{ $.Site.BaseURL }}categories/{{ . | urlize }}/"
    }
    {{ end }},
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}"
    }
  ]
}
</script>
{{ end }}
