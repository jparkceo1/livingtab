{{- $p := .page -}}
{{- $rank := .rank -}}
{{- $showRank := .showRank -}}
<a href="{{ $p.Permalink }}" class="flex flex-col cursor-pointer group no-underline">
  <div class="relative aspect-[4/3] mb-4 overflow-hidden bg-gray-100 shadow-sm">
    <img src="/covers/{{ $p.File.BaseFileName }}.jpg?v=4" alt="{{ $p.Title }}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
    <div class="absolute top-3 left-3 bg-white/20 p-1 rounded-sm backdrop-blur-[2px]">
      <i data-lucide="bookmark" class="text-white w-5 h-5 drop-shadow-md"></i>
    </div>
    {{ if $showRank }}
    <div class="absolute bottom-0 left-0 bg-[#FF6B2C] text-white w-9 h-9 flex items-center justify-center font-bold text-[18px] shadow-md">
      {{ $rank }}
    </div>
    {{ end }}
  </div>
  <h4 class="text-[19px] font-bold leading-[1.3] mb-2 text-gray-900 group-hover:text-amber-800 transition-colors tracking-tight font-serif-kr">
    {{ $p.Title }}
  </h4>
  <p class="text-[15px] text-gray-600 line-clamp-2 leading-[1.6] mb-3 tracking-tight font-medium">
    {{ $p.Params.description }}
  </p>
  <div class="flex items-center gap-[4px] mt-auto">
    <i data-lucide="pencil" class="w-[15px] h-[15px] text-[#D4A574]" fill="currentColor" stroke-width="0"></i>
    <span class="text-[14px] font-bold text-gray-900">{{ $p.ReadingTime }}분</span>
    <span class="text-[14px] text-gray-400 font-medium">· {{ $p.WordCount }}자</span>
  </div>
</a>
